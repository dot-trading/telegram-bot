apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegram-bot-sa
  namespace: trading-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: trading-ai
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: trading-ai
subjects:
- kind: ServiceAccount
  name: telegram-bot-sa
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
  namespace: trading-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      serviceAccountName: telegram-bot-sa
      containers:
        - name: telegram-bot
          # Overridden by CI via `kubectl set image` — replace with your Docker Hub image on first manual deploy
          image: hsaii/telegram-bot:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: service-endpoints
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: "postgres.trading-ai.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: postgres-password
            - name: ClusterSettings__OllamaUrl
              value: "http://ollama-eur.trading-ai.svc.cluster.local:11434"
            - name: ClusterSettings__PersistenceServiceUrl
              valueFrom:
                configMapKeyRef:
                  name: service-endpoints
                  key: PERSISTENCE_SERVICE_URL
            - name: TelegramBotSettings__BotToken
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: telegram-bot-token
            - name: TelegramBotSettings__AdminChatId
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: telegram-admin-chat-id
            - name: TelegramBotSettings__WebhookBaseUrl
              value: "https://telegram-bot.dotland.fr"
            - name: BinanceSettings__ApiKey
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: binance-api-key
            - name: BinanceSettings__ApiSecret
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: binance-api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-bot
  namespace: trading-ai
spec:
  selector:
    app: telegram-bot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
